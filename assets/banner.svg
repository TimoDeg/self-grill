<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1000 280" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1000" height="280" rx="20" fill="url(#bg)"/>
  <rect x="0" y="0" width="8" height="280" rx="4" fill="#D97757"/>

  <!-- the jury: five dots, escalating intensity (haiku → sonnet → opus) -->
  <g>
    <circle cx="470" cy="58" r="9"  fill="#4b5563"/>
    <circle cx="500" cy="58" r="9"  fill="#6b7280"/>
    <circle cx="530" cy="58" r="9"  fill="#b06a45"/>
    <circle cx="560" cy="58" r="9"  fill="#D97757"/>
    <circle cx="590" cy="58" r="11" fill="#f0976b"/>
  </g>

  <text x="500" y="150" fill="#f0f6fc" font-size="78" font-weight="800" text-anchor="middle" letter-spacing="-1">self-grill</text>
  <text x="500" y="196" fill="#8b949e" font-size="25" text-anchor="middle">Make Claude grill its own answers before it ships them.</text>
  <text x="500" y="240" fill="#D97757" font-size="19" font-weight="600" text-anchor="middle" font-family="'SFMono-Regular',Consolas,monospace">explain harder → refute (kill by default) → loop → survive</text>
</svg>
